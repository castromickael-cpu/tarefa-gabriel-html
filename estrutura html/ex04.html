<h2>Formulário para se alistar no Universo Goma</h2>

<form>
    <label>Identificação Gomária:</label>
    <input type="text" name="nome"><br><br>

    <label>Email:</label>
    <input type="email" name="email"><br><br>

    <label>Mensagem:</label><br>
    <textarea name="mensagem"></textarea><br><br>

    <label>
        <input type="checkbox" name="termos"> Aceitar termos
    </label><br><br>

    <label>Tipo:</label><br>
    <input type="radio" name="tipo" value="aluno"> aprendiz gomário<br>
    <input type="radio" name="tipo" value="professor"> gomador profissional<br><br>

    <button type="submit">Enviar</button>
</form>

</body>
